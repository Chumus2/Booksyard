{% extends "Booksyard/base.html" %}
{% load static %}

{% block title %} Reset password - Booksyard {% endblock %}

{% block css_file %} 
<link rel="stylesheet" href="{% static 'home/css/password_reset.css' %}">
{% endblock %}

{% block content %}

<div>

    <h2>Reset password</h2>

    <form method="post">
        {% csrf_token %}
        {{ form.email }}

        <button type="submit">Send reset link</button>
    </form>

</div>

{% endblock %}
