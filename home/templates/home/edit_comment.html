{% extends "Booksyard/base.html" %}
{% load static %}

{% block title %} Edit comment - Booksyard {% endblock %}

{% block css_file %} 
<link rel="stylesheet" href="{% static 'home/css/edit_comment.css' %}">
{% endblock %}

{% block content %}

<div>

    <h2>Edit comment</h2>

    <form method="post" action="">
        {% csrf_token %}

        <textarea name="text" rows="4">{{ comment.text }}</textarea>

        <button type="submit">Save</button>

    </form>

    <a href="{% url 'book_detail' comment.book.id %}">
        Cancel
    </a>

</div>

{% endblock %}
