{% extends "Booksyard/base.html" %}
{% load static %}

{% block title %} Verify code - Booksyard {% endblock %}

{% block css_file %} 
<link rel="stylesheet" href="{% static 'home/css/verify_code.css' %}">
{% endblock %}

{% block content %}

<div>

    <h2>Email verification</h2>

    <form method="post" action="">
        {% csrf_token %}

        <input type="text" name="code" placeholder="Enter 6-digit code here...">

        <button type="submit">Verify</button>

    </form>

</div>

{% endblock %}
